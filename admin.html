<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>QAppLab Admin Panel</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f6fb;
            padding:40px;
        }

        .admin-box{
            max-width:700px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
        }

        input, textarea, select{
            width:100%;
            padding:15px;
            margin-top:10px;
            margin-bottom:20px;
            border-radius:10px;
            border:1px solid #ccc;
        }

        button{
            background:#1f4aa8;
            color:white;
            padding:15px;
            border:none;
            border-radius:10px;
            width:100%;
            font-size:18px;
            cursor:pointer;
        }

        h1{
            color:#1f4aa8;
        }

    </style>

</head>

<body>

<div class="admin-box">

    <h1>QAppLab Admin Panel</h1>

    <input type="text"
       id="appName"
       placeholder="Application Name">

 <textarea id="appDescription"
placeholder="Application Description"></textarea>

   <input type="text"
       id="appURL"
       placeholder="Application URL">

  <select id="appCategory">
        <option>Econometrics</option>
        <option>Time Series</option>
        <option>Machine Learning</option>
        <option>Statistics</option>
    </select>

<button onclick="publishApp()">
    Publish Application
</button>

</div>
<script>

let password = prompt("Enter Admin Password");

if(password !== "20002000"){
    document.body.innerHTML = "<h1>Access Denied</h1>";
}

function publishApp(){

    let name =
    document.getElementById("appName").value;

    let description =
    document.getElementById("appDescription").value;

    let url =
    document.getElementById("appURL").value;

    let category =
    document.getElementById("appCategory").value;

    alert(
        "Application Published Successfully!\n\n" +

        "Name: " + name + "\n" +

        "Category: " + category + "\n" +

        "URL: " + url
    );

}

</script>


    

</body>


    

</html>
