<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>QAppLab Admin Panel</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f6fb;
            padding:40px;
        }

        .admin-box{
            max-width:700px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
        }

        input, textarea, select{
            width:100%;
            padding:15px;
            margin-top:10px;
            margin-bottom:20px;
            border-radius:10px;
            border:1px solid #ccc;
        }

        button{
            background:#1f4aa8;
            color:white;
            padding:15px;
            border:none;
            border-radius:10px;
            width:100%;
            font-size:18px;
            cursor:pointer;
        }

        h1{
            color:#1f4aa8;
        }

    </style>

</head>

<body>

<div class="admin-box">

    <h1>QAppLab Admin Panel</h1>

    <input type="text"
       id="appName"
       placeholder="Application Name">

 <textarea id="appDescription"
placeholder="Application Description"></textarea>

   <input type="text"
       id="appURL"
       placeholder="Application URL">

<select id="appCategory">
    <option>Time Series Analysis</option>
    <option>Econometrics</option>
    <option>Machine Learning</option>
    <option>Data Mining</option>
    <option>Experimental Design</option>
    <option>Biostatistics</option>
    <option>Multivariate Analysis</option>
    <option>Bayesian Statistics</option>
    <option>Sampling Theory</option>
    <option>Spatial Statistics</option>
    <option>Nonparametric Statistics</option>
    <option>Applied Statistics</option>
</select>

<button onclick="publishApp()">
    Publish Application
</button>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCdVWduXVuF3i2SyBo3lk-mA0Y04WEd1751E",
  authDomain: "qapplab-716e6.firebaseapp.com",
  projectId: "qapplab-716e6",
  storageBucket: "qapplab-716e6.firebasestorage.app",
  messagingSenderId: "102092641129",
  appId: "1:102092641129:web:e4ddb3f48968f40a50e3f8"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let password = prompt("Enter Admin Password");

if(password !== "20002000"){
    document.body.innerHTML = "<h1>Access Denied</h1>";
}

window.publishApp = async function(){

    let name = document.getElementById("appName").value;

    let description = document.getElementById("appDescription").value;

    let url = document.getElementById("appURL").value;

    let category = document.getElementById("appCategory").value;

    await addDoc(collection(db, "applications"), {

        name: name,
        description: description,
        url: url,
        category: category

    });

    alert("Application Published Successfully!");

}

</script>

</body>
</html>
